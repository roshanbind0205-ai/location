<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Tracking Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #map {
            height: 100vh;
        }

        #infoBox {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 15px;
            border-radius: 6px;
            box-shadow: 0 0 10px #0003;
            font-size: 14px;
            z-index: 1000;
            text-align: center;
            min-width: 250px;
        }

        #clearBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 10px #0004;
        }
    </style>
</head>

<body>

    <div id="infoBox">📍 Getting Location...</div>
    <button id="clearBtn">ALL CLEAR</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        const map = L.map('map').setView([25.3176, 82.9739], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        let marker = L.marker([25.3176, 82.9739]).addTo(map);

        let latlngs = [];
        let polyline = L.polyline(latlngs, {
            color: 'red',
            weight: 4,
            opacity: 0.8
        }).addTo(map);

        async function getFullAddress(lat, lng) {
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
                );
                const data = await res.json();

                let a = data.address;

                return `
                    ${a.road ? a.road + ", " : ""}
                    ${a.suburb ? a.suburb + ", " : ""}
                    ${a.village ? a.village + ", " : ""}
                    ${a.town ? a.town + ", " : ""}
                    ${a.city ? a.city + ", " : ""}
                    ${a.county ? a.county + ", " : ""}
                    ${a.state ? a.state : ""}
                `.replace(/,\s*,/g, ", ").trim();
            } catch {
                return "Unknown place";
            }
        }

        navigator.geolocation.watchPosition(
            async function (position) {

                let lat = position.coords.latitude;
                let lng = position.coords.longitude;

                marker.setLatLng([lat, lng]);

                latlngs.push([lat, lng]);
                polyline.setLatLngs(latlngs);

                const fullAddress = await getFullAddress(lat, lng);

                document.getElementById("infoBox").textContent =
                    "📍 " + fullAddress;

            },

            function (error) {
                document.getElementById("infoBox").textContent =
                    "❌ Location Error: " + error.message;
            },

            {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            }
        );

        document.getElementById("clearBtn").addEventListener("click", () => {
            latlngs = [];
            polyline.setLatLngs([]);
            document.getElementById("infoBox").textContent =
                "✔ Cleared All Tracks";
        });

    </script>

</body>

</html>
