<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 80vh;
        }

        .controls {
            padding: 8px;
            background: #eee;
            font-family: Arial;
        }

        input {
            margin: 3px;
            padding: 4px;
            width: 120px;
        }
    </style>
</head>

<body>

    <div class="controls">
        Latitude: <input id="lat1" placeholder="Enter Latitude">
        Longitude: <input id="lng1" placeholder="Enter Longitude">
        Zoom: <input id="zoom1" value="15">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        const map = L.map("map").setView([25.3176, 82.9739], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

        let marker = L.marker([25.3176, 82.9739]).addTo(map);
        let points = [];
        let line = L.polyline(points, { color: "blue", weight: 4 }).addTo(map);
        let totalDist = 0;

        function calcDist(a, b, c, d) {
            const R = 6371000;
            const x = (c - a) * Math.PI / 180;
            const y = (d - b) * Math.PI / 180;
            const z = Math.sin(x / 2) ** 2 +
                Math.cos(a * Math.PI / 180) * Math.cos(c * Math.PI / 180) * Math.sin(y / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(z), Math.sqrt(1 - z));
        }

        document.getElementById("zoom1").value = map.getZoom();
        map.on("zoomend", () => document.getElementById("zoom1").value = map.getZoom());
        document.getElementById("zoom1").onchange = () => map.setZoom(+zoom1.value);

        navigator.geolocation.watchPosition(pos => {
            let lat = pos.coords.latitude, lng = pos.coords.longitude;

            if (points.length) {
                let p = points[points.length - 1];
                totalDist += calcDist(p[0], p[1], lat, lng);
            }

            marker.setLatLng([lat, lng]);
            map.setView([lat, lng]);

            points.push([lat, lng]);
            line.setLatLngs(points);

            lat1.value = lat.toFixed(6);
            lng1.value = lng.toFixed(6);
            dist1.value = totalDist.toFixed(2);

        });

    </script>

</body>

</html>
