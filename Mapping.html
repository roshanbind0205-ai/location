<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Update Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #map {
            height: 80vh;
        }

        .controls {
            padding: 10px;
            background: #eee;
        }

        input {
            padding: 6px;
            margin: 4px;
            width: 150px;
        }
    </style>
</head>

<body>

    <div class="controls">
        Latitude: <input id="lat" placeholder="Enter Latitude">
        Longitude: <input id="lng" placeholder="Enter Longitude">
        Zoom: <input id="zoom" value="17">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        const map = L.map("map").setView([25.3176, 82.9739], 17);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

        let marker = L.marker([25.3176, 82.9739]).addTo(map);

        function updateMapFromInput() {
            let la = parseFloat(lat.value);
            let ln = parseFloat(lng.value);
            let zm = parseInt(zoom.value);

            if (!isNaN(la) && !isNaN(ln)) {
                map.setView([la, ln], map.getZoom());
                marker.setLatLng([la, ln]);
            }

            if (!isNaN(zm)) {
                map.setZoom(zm);
            }
        }

        lat.oninput = updateMapFromInput;
        lng.oninput = updateMapFromInput;
        zoom.oninput = updateMapFromInput;

        navigator.geolocation.watchPosition(
            pos => {
                let la = pos.coords.latitude;
                let ln = pos.coords.longitude;

                marker.setLatLng([la, ln]);
                map.panTo([la, ln]);

                lat.value = la.toFixed(6);
                lng.value = ln.toFixed(6);
            },
            err => alert("GPS Error: " + err.message),
            {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            }
        );

    </script>

</body>

</html>
